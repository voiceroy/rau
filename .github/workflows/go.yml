name: Go
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Build Linux
        run: go build -v -tags linux ./...
      - name: Build Darwin
        run: GOOS=darwin GOARCH=arm64 go build -v -tags darwin ./...
      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -v -tags windows ./...
